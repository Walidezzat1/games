<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الخداع الذكي | Multiplayer Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="questions.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { cairo: ['Cairo', 'sans-serif'] },
                    colors: {
                        brand: {
                            dark: '#1e1b4b', primary: '#4f46e5', secondary: '#ec4899',
                            accent: '#f59e0b', success: '#10b981'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #4f46e5, #ec4899); transition: transform 0.2s; }
        .btn-primary:hover { transform: scale(1.02); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="app-container" class="w-full max-w-2xl mx-auto hidden">
        <div id="screen-login" class="glass-panel rounded-2xl p-8 flex flex-col items-center space-y-6 text-center">
            <i data-lucide="brain-circuit" class="w-16 h-16 text-brand-primary"></i>
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-brand-primary to-brand-secondary">الخداع الذكي</h1>
            <input type="text" id="input-nickname" placeholder="اسمك المستعار..." class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-center text-lg">
            <button onclick="createRoom()" class="btn-primary w-full py-3 rounded-xl font-bold text-lg">إنشاء غرفة</button>
            <div class="flex gap-2 w-full">
                <input type="text" id="input-room-code" placeholder="كود الغرفة" class="flex-1 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-center uppercase">
                <button onclick="joinRoom()" class="bg-slate-700 px-6 rounded-xl font-bold">انضمام</button>
            </div>
        </div>

        <div id="screen-lobby" class="glass-panel rounded-2xl p-6 hidden flex-col items-center">
            <h2 class="text-xl mb-4">كود الغرفة: <span id="display-room-code" class="text-brand-accent font-mono text-3xl">----</span></h2>
            <div id="players-list" class="flex flex-wrap gap-2 mb-6 justify-center"></div>
            <div id="host-controls" class="hidden">
                <button onclick="startGame()" class="btn-primary px-10 py-3 rounded-xl font-bold">ابدأ اللعبة</button>
            </div>
        </div>

        <div id="screen-write" class="hidden flex flex-col space-y-4">
            <div class="flex justify-between bg-slate-800 p-3 rounded-xl">
                <span id="round-info-write">السؤال 1 من 25</span>
                <span id="timer-write" class="font-mono text-brand-accent">30</span>
            </div>
            <div class="glass-panel rounded-2xl p-6 text-center">
                <p id="question-text" class="text-2xl font-bold mb-6">...</p>
                <div id="write-form">
                    <input type="text" id="input-fake-answer" placeholder="اكتب إجابة تخدع بها أصدقائك..." class="w-full p-4 rounded-xl bg-slate-800 border-2 border-slate-600 text-center text-lg mb-4">
                    <button onclick="submitFakeAnswer()" class="btn-primary w-full py-3 rounded-xl font-bold">إرسال الخدعة</button>
                </div>
                <div id="write-waiting" class="hidden text-slate-400 animate-pulse">تم الاستلام.. بانتظار البقية...</div>
            </div>
        </div>

        <div id="screen-choose" class="hidden flex flex-col space-y-4">
            <div class="flex justify-between bg-slate-800 p-3 rounded-xl text-brand-secondary font-bold">
                <span id="round-info-choose">اختر الإجابة الصحيحة!</span>
                <span id="timer-choose" class="font-mono">20</span>
            </div>
            <div id="choices-area" class="grid grid-cols-1 gap-3"></div>
        </div>

        <div id="screen-results" class="hidden glass-panel rounded-2xl p-6 text-center">
            <h2 class="text-2xl mb-4">الإجابة الصحيحة هي:</h2>
            <p id="correct-answer-display" class="text-3xl font-bold text-brand-success mb-6 bg-green-500/10 p-4 rounded-xl">...</p>
            <div id="results-details" class="text-right space-y-2 mb-6"></div>
            <div id="host-next-round" class="hidden">
                <button onclick="nextRound()" class="btn-primary w-full py-3 rounded-xl font-bold">السؤال التالي</button>
            </div>
        </div>

        <div id="screen-leaderboard" class="hidden glass-panel rounded-2xl p-6 text-center">
            <h2 class="text-3xl font-bold mb-6">الترتيب النهائي 🏆</h2>
            <div id="leaderboard-list" class="space-y-2 mb-6"></div>
            <button onclick="location.reload()" class="bg-slate-700 w-full py-3 rounded-xl">العودة للرئيسية</button>
        </div>
        
        <footer class="text-center text-slate-600 text-xs mt-8">إعداد موجّه الفيزياء أ/وليد عزت</footer>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-50">
        <div class="w-12 h-12 border-4 border-brand-primary border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-slate-400">جاري الاتصال بقاعدة البيانات...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- مفاتيحك الخاصة ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5vPVQnEEnmx1yv6BGrtDVzmEjQ3PcP1Q",
            authDomain: "smartgame-dbb51.firebaseapp.com",
            projectId: "smartgame-dbb51",
            storageBucket: "smartgame-dbb51.firebasestorage.app",
            messagingSenderId: "943840300648",
            appId: "1:943840300648:web:31f18ee9ea6d92ba96b5dd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let roomId = null;
        let localState = {};

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                showScreen('screen-login');
            } else {
                signInAnonymously(auth);
            }
        });

        // دوال المساعدة
        function showScreen(id) {
            ['screen-login', 'screen-lobby', 'screen-write', 'screen-choose', 'screen-results', 'screen-leaderboard'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            if (window.lucide) lucide.createIcons();
        }

        window.createRoom = async () => {
            const name = document.getElementById('input-nickname').value.trim();
            if(!name) return alert("أدخل اسمك");
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            roomId = code;
            
            // اختيار 25 سؤال عشوائي من الملف الخارجي
            const shuffled = [...window.questionDatabase].sort(() => 0.5 - Math.random()).slice(0, 25);
            
            await setDoc(doc(db, "rooms", code), {
                host: currentUser.uid,
                state: 'waiting',
                players: { [currentUser.uid]: { name, score: 0 } },
                questions: shuffled,
                currentQ: 0,
                answers: {}, // إجابات اللاعبين المضللة
                choices: {}  // اختيارات اللاعبين النهائية
            });
            listenToRoom(code);
        };

        window.joinRoom = async () => {
            const name = document.getElementById('input-nickname').value.trim();
            const code = document.getElementById('input-room-code').value.trim().toUpperCase();
            if(!name || !code) return alert("أكمل البيانات");
            
            const ref = doc(db, "rooms", code);
            const snap = await getDoc(ref);
            if(snap.exists()) {
                await updateDoc(ref, { [`players.${currentUser.uid}`]: { name, score: 0 } });
                roomId = code;
                listenToRoom(code);
            } else { alert("الغرفة غير موجودة"); }
        };

        function listenToRoom(id) {
            onSnapshot(doc(db, "rooms", id), (snap) => {
                if(!snap.exists()) return;
                const data = snap.data();
                localState = data;
                updateUI(data);
            });
        }

        function updateUI(data) {
            const isHost = data.host === currentUser.uid;
            
            if(data.state === 'waiting') {
                showScreen('screen-lobby');
                document.getElementById('display-room-code').textContent = roomId;
                document.getElementById('players-list').innerHTML = Object.values(data.players).map(p => `<span class="bg-slate-700 px-4 py-2 rounded-full font-bold">👤 ${p.name}</span>`).join('');
                if(isHost) document.getElementById('host-controls').classList.remove('hidden');
            } 
            else if(data.state === 'writing') {
                showScreen('screen-write');
                const q = data.questions[data.currentQ];
                document.getElementById('question-text').textContent = q.q;
                document.getElementById('round-info-write').textContent = `السؤال ${data.currentQ + 1} من 25`;
                
                const hasSubmitted = data.answers && data.answers[currentUser.uid];
                document.getElementById('write-form').classList.toggle('hidden', hasSubmitted);
                document.getElementById('write-waiting').classList.toggle('hidden', !hasSubmitted);
                
                if(isHost) checkTransition(data, 'answers', 'choosing');
            }
            else if(data.state === 'choosing') {
                showScreen('screen-choose');
                const q = data.questions[data.currentQ];
                const hasSelected = data.choices && data.choices[currentUser.uid];
                
                if(!hasSelected) {
                    renderChoices(data);
                } else {
                    document.getElementById('choices-area').innerHTML = `<div class="text-center p-8 animate-pulse text-slate-400">تم تسجيل اختيارك.. بانتظار البقية</div>`;
                }
                
                if(isHost) checkTransition(data, 'choices', 'results');
            }
            else if(data.state === 'results') {
                showScreen('screen-results');
                const q = data.questions[data.currentQ];
                document.getElementById('correct-answer-display').textContent = q.a;
                if(isHost) document.getElementById('host-next-round').classList.remove('hidden');
                
                // عرض من خدع من
                let resHTML = "";
                Object.entries(data.choices).forEach(([uid, choice]) => {
                    const playerName = data.players[uid].name;
                    if(choice === q.a) {
                        resHTML += `<p class="bg-green-500/20 p-2 rounded">✅ <b>${playerName}</b> عرف الإجابة الصحيحة!</p>`;
                    } else {
                        // البحث عن صاحب الخدعة
                        const tricksterUid = Object.keys(data.answers).find(key => data.answers[key] === choice);
                        const tricksterName = tricksterUid ? data.players[tricksterUid].name : "غير معروف";
                        resHTML += `<p class="bg-red-500/20 p-2 rounded">❌ <b>${playerName}</b> انطلت عليه خدعة <b>${tricksterName}</b></p>`;
                    }
                });
                document.getElementById('results-details').innerHTML = resHTML;
            }
            else if(data.state === 'leaderboard') {
                showScreen('screen-leaderboard');
                const sorted = Object.values(data.players).sort((a,b) => b.score - a.score);
                document.getElementById('leaderboard-list').innerHTML = sorted.map((p, i) => `
                    <div class="flex justify-between bg-slate-800 p-4 rounded-xl border border-slate-700">
                        <span>${i+1}. ${p.name}</span>
                        <span class="text-brand-accent font-bold">${p.score} نقطة</span>
                    </div>
                `).join('');
            }
        }

        window.startGame = () => {
            updateDoc(doc(db, "rooms", roomId), { state: 'writing', answers: {}, choices: {} });
        };

        window.submitFakeAnswer = async () => {
            const ans = document.getElementById('input-fake-answer').value.trim();
            if(!ans) return;
            // منع كتابة الإجابة الصحيحة كخدعة
            if(ans === localState.questions[localState.currentQ].a) {
                alert("لا يمكنك كتابة الإجابة الصحيحة كخدعة!");
                return;
            }
            await updateDoc(doc(db, "rooms", roomId), { [`answers.${currentUser.uid}`]: ans });
            document.getElementById('input-fake-answer').value = "";
        };

        function renderChoices(data) {
            const q = data.questions[data.currentQ];
            // تجميع الإجابة الصحيحة + كل إجابات اللاعبين المضللة
            let allOptions = [q.a, ...Object.values(data.answers)];
            // حذف التكرار وخلط الخيارات
            allOptions = [...new Set(allOptions)].sort(() => 0.5 - Math.random());
            
            const area = document.getElementById('choices-area');
            area.innerHTML = allOptions.map(opt => `
                <button onclick="submitChoice('${opt.replace(/'/g, "\\'")}')" class="bg-slate-800 p-4 rounded-xl border-2 border-slate-700 hover:border-brand-primary font-bold text-lg transition-all">
                    ${opt}
                </button>
            `).join('');
        }

        window.submitChoice = async (val) => {
            await updateDoc(doc(db, "rooms", roomId), { [`choices.${currentUser.uid}`]: val });
        };

        window.nextRound = async () => {
            const nextQ = localState.currentQ + 1;
            if(nextQ >= 25) {
                await updateDoc(doc(db, "rooms", roomId), { state: 'leaderboard' });
            } else {
                await updateDoc(doc(db, "rooms", roomId), { state: 'writing', currentQ: nextQ, answers: {}, choices: {} });
            }
        };

        // دالة للمدير للانتقال التلقائي عند اكتمال الإجابات
        function checkTransition(data, field, nextState) {
            const pCount = Object.keys(data.players).length;
            const sCount = Object.keys(data[field] || {}).length;
            if(sCount >= pCount && pCount > 0) {
                // إذا كنا ننتقل للنتائج، نحسب النقاط
                if(nextState === 'results') {
                    calculateScores(data);
                } else {
                    updateDoc(doc(db, "rooms", roomId), { state: nextState });
                }
            }
        }

        async function calculateScores(data) {
            const q = data.questions[data.currentQ];
            let newPlayers = {...data.players};
            
            Object.entries(data.choices).forEach(([uid, choice]) => {
                if(choice === q.a) {
                    newPlayers[uid].score += 1000; // نقطة للإجابة الصحيحة
                } else {
                    // العثور على اللاعب الذي كتب هذه الخدعة لإعطائه نقاط
                    const tricksterUid = Object.keys(data.answers).find(key => data.answers[key] === choice);
                    if(tricksterUid && newPlayers[tricksterUid]) {
                        newPlayers[tricksterUid].score += 500; // نقطة لكل شخص خدعته
                    }
                }
            });
            await updateDoc(doc(db, "rooms", roomId), { state: 'results', players: newPlayers });
        }
    </script>
</body>
</html>
